name: Upstream compatibility

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  test-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install with latest academic-refchecker
        run: |
          pip install -e ".[dev]"
          pip install --upgrade academic-refchecker
      - name: Show version
        run: pip show academic-refchecker
      - name: Run tests
        run: pytest tests/ --cov=mcp_refchecker --cov-report=term-missing
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['upstream-break']
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Tests failing against latest academic-refchecker',
                body: `Automated compatibility check failed.\n\nSee [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
                labels: ['upstream-break']
              });
            }
